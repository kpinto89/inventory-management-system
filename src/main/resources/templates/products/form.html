<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle + ' | InvenTrack'}">Product Form | InvenTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-width: 260px; --primary-color: #4f46e5; --sidebar-bg: #1e1b4b; --sidebar-text: #c7d2fe; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .sidebar { width: var(--sidebar-width); min-height: 100vh; background: var(--sidebar-bg); position: fixed; top: 0; left: 0; z-index: 100; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 1.5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-brand h5 { color: #fff; font-weight: 700; font-size: 1rem; margin: 0; }
        .sidebar-brand small { color: var(--sidebar-text); font-size: 0.75rem; }
        .sidebar-nav { padding: 1rem 0; flex: 1; }
        .nav-label { padding: 0.5rem 1.25rem; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(199,210,254,0.5); }
        .sidebar-nav .nav-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 1.25rem; color: var(--sidebar-text); font-size: 0.875rem; font-weight: 500; text-decoration: none; transition: all 0.2s; }
        .sidebar-nav .nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .sidebar-nav .nav-link.active { color: #fff; background: var(--primary-color); }
        .sidebar-nav .nav-link i { font-size: 1.1rem; width: 20px; text-align: center; }
        .main-content { margin-left: var(--sidebar-width); min-height: 100vh; display: flex; flex-direction: column; }
        .topbar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 0.875rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 99; }
        .topbar h4 { margin: 0; font-weight: 600; font-size: 1.1rem; }
        .page-content { padding: 1.5rem; flex: 1; }
        .form-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 2rem; }
        .form-label { font-weight: 500; font-size: 0.875rem; color: #374151; }
        .form-control, .form-select { border-color: #d1d5db; font-size: 0.875rem; }
        .form-control:focus, .form-select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); }
        .btn-primary:hover { background-color: #4338ca; border-color: #4338ca; }
        .section-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="d-flex align-items-center gap-2">
            <div style="width:36px;height:36px;background:#4f46e5;border-radius:8px;display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-box-seam text-white" style="font-size:1.2rem;"></i>
            </div>
            <div>
                <h5>InvenTrack</h5>
                <small>Management System</small>
            </div>
        </div>
    </div>
    <div class="sidebar-nav">
        <div class="nav-label">Main</div>
        <a th:href="@{/}" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <div class="nav-label mt-2">Inventory</div>
        <a th:href="@{/products}" class="nav-link"><i class="bi bi-box-seam"></i> All Products</a>
        <a th:href="@{/products/new}" class="nav-link active"><i class="bi bi-plus-circle"></i> Add Product</a>
        <a th:href="@{/products/low-stock}" class="nav-link"><i class="bi bi-exclamation-triangle"></i> Low Stock</a>
        <div class="nav-label mt-2">System</div>
        <a href="/h2-console" target="_blank" class="nav-link"><i class="bi bi-database"></i> Database Console</a>
    </div>
    <div style="padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.1);">
        <small style="color: rgba(199,210,254,0.5); font-size: 0.7rem;">InvenTrack v1.0 &copy; 2026</small>
    </div>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/products}" class="btn btn-light btn-sm me-2">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 th:text="${pageTitle}">Add Product</h4>
        </div>
    </div>

    <div class="page-content">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <form th:action="${product.id != null ? '/products/' + product.id + '/edit' : '/products/new'}"
                          th:object="${product}" method="post" novalidate>

                        <!-- Basic Info -->
                        <div class="section-title">Basic Information</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <label for="name" class="form-label">Product Name <span class="text-danger">*</span></label>
                                <input type="text" id="name" th:field="*{name}"
                                       class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                       placeholder="e.g. Wireless Keyboard">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                            </div>
                            <div class="col-md-4">
                                <label for="sku" class="form-label">SKU <span class="text-danger">*</span></label>
                                <input type="text" id="sku" th:field="*{sku}"
                                       class="form-control" th:classappend="${#fields.hasErrors('sku')} ? 'is-invalid'"
                                       placeholder="e.g. ELEC-001">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></div>
                            </div>
                            <div class="col-12">
                                <label for="description" class="form-label">Description</label>
                                <textarea id="description" th:field="*{description}"
                                          class="form-control" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                          rows="3" placeholder="Product description..."></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                                <select id="category" th:field="*{category}" class="form-select">
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.name()}"
                                            th:text="${cat.name().replace('_', ' ')}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Pricing & Stock -->
                        <div class="section-title">Pricing &amp; Stock</div>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label for="price" class="form-label">Unit Price ($) <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" id="price" th:field="*{price}" step="0.01" min="0.01"
                                           class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                                           placeholder="0.00">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label for="quantity" class="form-label">Quantity <span class="text-danger">*</span></label>
                                <input type="number" id="quantity" th:field="*{quantity}" min="0"
                                       class="form-control" th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"
                                       placeholder="0">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                            </div>
                            <div class="col-md-4">
                                <label for="lowStockThreshold" class="form-label">Low Stock Threshold</label>
                                <input type="number" id="lowStockThreshold" th:field="*{lowStockThreshold}" min="0"
                                       class="form-control" th:classappend="${#fields.hasErrors('lowStockThreshold')} ? 'is-invalid'"
                                       placeholder="10">
                                <div class="form-text">Alert when quantity falls below this</div>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('lowStockThreshold')}" th:errors="*{lowStockThreshold}"></div>
                            </div>
                        </div>

                        <hr class="my-4">
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/products}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${product.id != null ? 'Update Product' : 'Add Product'}">Save</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
