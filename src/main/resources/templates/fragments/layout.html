<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' | Inventory MS' : 'Inventory Management System'}">Inventory MS</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --sidebar-bg: #1e1b4b;
            --sidebar-text: #c7d2fe;
            --sidebar-active: #4f46e5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background: var(--sidebar-bg);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            padding: 1.5rem 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-brand h5 {
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            margin: 0;
        }

        .sidebar-brand small {
            color: var(--sidebar-text);
            font-size: 0.75rem;
        }

        .sidebar-nav {
            padding: 1rem 0;
            flex: 1;
        }

        .sidebar-nav .nav-label {
            padding: 0.5rem 1.25rem;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(199,210,254,0.5);
        }

        .sidebar-nav .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 1.25rem;
            color: var(--sidebar-text);
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 0;
            transition: all 0.2s;
            text-decoration: none;
        }

        .sidebar-nav .nav-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
        }

        .sidebar-nav .nav-link.active {
            color: #fff;
            background: var(--sidebar-active);
        }

        .sidebar-nav .nav-link i {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        /* Main content */
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Topbar */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0.875rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .topbar h4 {
            margin: 0;
            font-weight: 600;
            font-size: 1.1rem;
            color: #0f172a;
        }

        /* Page content */
        .page-content {
            padding: 1.5rem;
            flex: 1;
        }

        /* Cards */
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid #e2e8f0;
            transition: box-shadow 0.2s;
        }

        .stat-card:hover {
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        /* Table */
        .data-table {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .data-table .table {
            margin: 0;
        }

        .data-table .table th {
            background-color: #f8fafc;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            padding: 0.875rem 1rem;
        }

        .data-table .table td {
            padding: 0.875rem 1rem;
            vertical-align: middle;
            border-color: #f1f5f9;
            font-size: 0.875rem;
        }

        /* Badges */
        .stock-badge {
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
        }

        .badge-low {
            background-color: #fef2f2;
            color: #dc2626;
        }

        .badge-ok {
            background-color: #f0fdf4;
            color: #16a34a;
        }

        /* Buttons */
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        /* Form card */
        .form-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 2rem;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
            color: #374151;
        }

        .form-control, .form-select {
            border-color: #d1d5db;
            font-size: 0.875rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }

        /* Alert */
        .alert {
            border-radius: 10px;
            font-size: 0.875rem;
        }

        /* Category badge */
        .category-badge {
            font-size: 0.72rem;
            padding: 0.25rem 0.5rem;
            border-radius: 5px;
            font-weight: 600;
            background-color: #ede9fe;
            color: #7c3aed;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" th:fragment="sidebar">
    <div class="sidebar-brand">
        <div class="d-flex align-items-center gap-2">
            <div style="width:36px;height:36px;background:#4f46e5;border-radius:8px;display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-box-seam text-white" style="font-size:1.2rem;"></i>
            </div>
            <div>
                <h5>InvenTrack</h5>
                <small>Management System</small>
            </div>
        </div>
    </div>
    <div class="sidebar-nav">
        <div class="nav-label">Main</div>
        <a th:href="@{/}" class="nav-link" th:classappend="${currentPage == 'dashboard'} ? 'active'">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <div class="nav-label mt-2">Inventory</div>
        <a th:href="@{/products}" class="nav-link" th:classappend="${currentPage == 'products'} ? 'active'">
            <i class="bi bi-box-seam"></i> All Products
        </a>
        <a th:href="@{/products/new}" class="nav-link" th:classappend="${currentPage == 'new-product'} ? 'active'">
            <i class="bi bi-plus-circle"></i> Add Product
        </a>
        <a th:href="@{/products/low-stock}" class="nav-link" th:classappend="${currentPage == 'low-stock'} ? 'active'">
            <i class="bi bi-exclamation-triangle"></i> Low Stock
        </a>
        <div class="nav-label mt-2">System</div>
        <a href="/h2-console" target="_blank" class="nav-link">
            <i class="bi bi-database"></i> Database Console
        </a>
    </div>
    <div style="padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.1);">
        <small style="color: rgba(199,210,254,0.5); font-size: 0.7rem;">InvenTrack v1.0 &copy; 2026</small>
    </div>
</div>

<!-- Main layout fragment (used in each page) -->
<div th:fragment="layout(title, pageId, content)" class="main-content">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="topbar">
        <h4 th:text="${title}">Page Title</h4>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted" style="font-size:0.8rem;" th:text="${#temporals.format(#temporals.createNow(), 'MMMM d, yyyy')}"></span>
            <div style="width:34px;height:34px;background:#4f46e5;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-person-fill text-white"></i>
            </div>
        </div>
    </div>
    <div class="page-content">
        <div th:replace="${content}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
